<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Games — Poko</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            color: white;
            min-height: 100vh;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            flex-wrap: wrap;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            background: linear-gradient(90deg, #ff6b6b, #feca57, #48dbfb);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .nav-links {
            display: flex;
            gap: 25px;
        }

        .nav-links a {
            color: #ddd;
            text-decoration: none;
        }

        .nav-links a:hover {
            color: #feca57;
        }

        .search-container {
            display: flex;
            justify-content: center;
            margin: 30px 20px;
        }

        .search-box {
            display: flex;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 60px;
            padding: 5px 5px 5px 20px;
            width: 100%;
            max-width: 500px;
            backdrop-filter: blur(10px);
        }

        .search-box input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 12px;
            font-size: 16px;
            color: white;
            outline: none;
        }

        .search-box input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .search-box button {
            background: #feca57;
            border: none;
            border-radius: 60px;
            padding: 10px 25px;
            font-weight: bold;
            cursor: pointer;
        }

        .category {
            padding: 20px 40px;
        }

        .category h2 {
            font-size: 28px;
            margin-bottom: 20px;
            border-left: 4px solid #feca57;
            padding-left: 15px;
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            margin-top: 15px;
        }

        .game-card {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 15px;
            text-align: center;
            transition: 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .game-card:hover {
            transform: translateY(-8px);
            background: rgba(255, 255, 255, 0.15);
            border-color: #feca57;
        }

        .game-icon {
            font-size: 60px;
            margin-bottom: 10px;
        }

        .game-card h3 {
            font-size: 16px;
        }

        .game-card a {
            text-decoration: none;
            color: white;
            display: block;
        }

        .back-btn {
            display: inline-block;
            margin: 20px 40px;
            padding: 10px 20px;
            background: #feca57;
            color: #0f0c29;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
        }

        .footer {
            text-align: center;
            padding: 40px;
            color: #666;
            font-size: 13px;
        }

        @media (max-width: 700px) {
            .navbar {
                flex-direction: column;
                text-align: center;
            }
            .category {
                padding: 20px;
            }
        }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="logo">🎮 Poko</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="games.html">All Games</a>
            <a href="#">New</a>
            <a href="#">Multiplayer</a>
        </div>
    </div>

    <a href="index.html" class="back-btn">← Back to Home</a>

    <div class="search-container">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search 150+ games..." onkeyup="searchGames()">
            <button onclick="searchGames()">🔍 Search</button>
        </div>
    </div>

    <div class="category">
        <h2>🎮 All Games (150+)</h2>
        <div class="game-grid" id="allGamesGrid"></div>
    </div>

    <div class="footer">
        <p>Poko — made by a kid who was bored in class. No bullsh*t, just games. 🤙</p>
    </div>

            { name: "Plants vs Zombies", icon: "🌱", url: "https://www.crazygames.com/game/plants-vs-zombies" },
            { name: "Poket52", icon: "🎮", url: "https://poket52.com" },
            { name: "GamH5", icon: "🎮", url: "https://gamh5.com" },
            { name: "Itch.io", icon: "🎮", url: "https://itch.io/games/html5/free" }
        ];

        function renderGameCards(gameArray) {
            const container = document.getElementById("allGamesGrid");
            container.innerHTML = "";
            gameArray.forEach(game => {
                const card = document.createElement("div");
                card.className = "game-card";
                card.innerHTML = `
                    <a href="${game.url}" target="_blank">
                        <div class="game-icon">${game.icon}</div>
                        <h3>${game.name}</h3>
                    </a>
                `;
                container.appendChild(card);
            });
        }

        function searchGames() {
            const input = document.getElementById("searchInput");
            const searchTerm = input.value.toLowerCase();
            if (searchTerm === "") {
                renderGameCards(games);
                return;
            }
            const filtered = games.filter(game => game.name.toLowerCase().includes(searchTerm));
            renderGameCards(filtered);
            if (filtered.length === 0) {
                document.getElementById("allGamesGrid").innerHTML = "<p style='grid-column:1/-1; text-align:center;'>No games found. Try 'snake' or 'bloxd' 🤙</p>";
            }
        }

        renderGameCards(games);
    </script>
</body>
</html>
