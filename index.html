<!DOCTYPE html>
<html>
<head>
    <title>Unblocked Games</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: #0d0d2b;
            color: white;
            margin: 0;
            padding: 20px;
        }
        h1 {
            font-size: 32px;
        }
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        .game-card {
            background: #1a1a3e;
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #333;
        }
        .game-card a {
            color: #00ffcc;
            text-decoration: none;
            font-size: 20px;
            font-weight: bold;
        }
        .game-card p {
            color: #aaa;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <h1>🎮 Unblocked Games</h1>
    <p>Play at school — no blocks, no downloads</p>
    <div class="game-grid">
        <div class="game-card">
            <a href="game1.html">▶️ Game 1</a>
            <p>Coming soon</p>
        </div>
        <div class="game-card">
            <a href="game2.html">▶️ Game 2</a>

        </div>
        <div class="game-card">
            <a href="game3.html">▶️ Game 3</a>

    </div>
    <p style="margin-top: 50px; font-size: 12px;">Bookmark this page 🔥</p>

</html>
