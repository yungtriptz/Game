<!DOCTYPE html>
<html>
<head>
    <title>Unblocked Games</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #0d0d2b;
            color: white;
            padding: 20px;
            margin: 0;
        }
        h1 { font-size: 32px; }
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            max-width: 900px;
            margin: 0 auto;
            padding: 10px;
        }
        .game-card {
            background: #1a1a3e;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #333;
        }
        .game-card a {
            color: #00ffcc;
            text-decoration: none;
            font-size: 18px;
            font-weight: bold;
            display: block;
        }
        .game-card p {
            color: #aaa;
            font-size: 12px;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <h1>🎮 Unblocked Games</h1>
    <p>Play at school — no blocks</p>
    <div class="game-grid">
        <div class="game-card">
            <a href="game1.html">🐍 Snake</a>
            <p>Classic snake game</p>
        </div>
        <div class="game-card">
            <a href="game2.html">🧩 Tetris</a>
            <p>Stack the blocks</p>
        </div>
        <div class="game-card">
            <a href="game3.html">👾 Pacman</a>
            <p>Eat the dots</p>
        </div>
        <div class="game-card">
            <a href="game4.html">👽 Space Invaders</a>
            <p>Defend Earth</p>
        </div>
        <div class="game-card">
            <a href="game5.html">🐸 Frogger</a>
            <p>Cross the road</p>
        </div>
        <div class="game-card">
            <a href="game6.html">🧱 Breakout</a>
            <p>Break the bricks</p>
        </div>
    </div>
</body>
</html>
